<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Google</title>
    
    <!-- Include Roboto font (standard Google font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Google brand variables */
        :root {
            --google-blue: #1a73e8;
            --google-blue-hover: #1b66c9;
            --text-primary: #202124;
            --bg-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Google Sans is used inside Google products, Roboto is a great alternative */
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Header with logo */
        header {
            padding: 24px 32px;
            flex-shrink: 0;
        }

        header img {
            height: 32px;
            width: auto;
            user-select: none;
        }

        /* Main content centered */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 56px;
            font-weight: 400;
            margin: 0;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 10vh; /* Slightly raise the text visually */
        }

        /* Material 3 style button */
        .return-button {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background-color: var(--google-blue);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 24px; /* Rounded capsule button */
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.25px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .return-button:hover {
            background-color: var(--google-blue-hover);
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .return-button:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(26,115,232,0.3);
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            h1 {
                font-size: 36px;
            }
            .return-button {
                bottom: 24px;
                right: 24px;
            }
            header {
                padding: 16px 24px;
            }
        }

        /* Soft text fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <!-- Original Google logo -->
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
    </header>

    <main>
        <h1>Thank you for your feedback!</h1>
    </main>

    <!-- Return button in the bottom right corner -->
    <a href="https://www.google.com" class="return-button">
        Return to Google.com
    </a>
</body>
</html>
